<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel da Equipe (Auto)</title>

<style>
body{font-family:Arial;background:#020617;color:#fff;margin:0}

header{text-align:center;padding:15px;background:#1e293b;font-size:18px}

.container{display:grid;grid-template-columns:1fr;gap:12px;padding:10px}

.card{background:#1e293b;padding:12px;border-radius:12px;position:relative}

.intervalo{position:absolute;top:10px;right:10px;background:#ef4444;padding:4px 8px;border-radius:8px;font-size:12px}

.row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}

.caixa{padding:12px;border-radius:10px;font-size:14px;display:flex;flex-direction:column}

.pix{background:#22c55e}
.cartao{background:#f59e0b}
.apoio{background:#ef4444}
.presente{background:#3b82f6!important}

.role{font-size:11px;margin-top:3px}
.msg{text-align:center;padding:20px;font-size:14px;opacity:0.8}
</style>
</head>
<body>

<header>📲 Painel da Equipe (Auto)</header>

<div id="msg" class="msg">Aguardando dados...</div>

<div class="container" id="painel"></div>

<script>
const escala={
"Quinta":{i:"16:10",pix:[1,2],c1:[3,4],c2:[5,6],a:[7,8,9,10]},
"Sexta":{i:"11:00",pix:[11,12],c1:[13,14],c2:[15,16],a:[17,18,19,20]},
"Sábado":{i:"11:00",pix:[21,22],c1:[23,24],c2:[25,1],a:[2,3,4,5]},
"Domingo":{i:"17:20",pix:[6,7],c1:[8,9],c2:[10,11],a:[12,13,14,15,16,17]}
};

let nomes={}, pres={}, roles={};

function importar(){
try{
let param=new URLSearchParams(window.location.search).get("data");
if(!param){
document.getElementById("msg").innerText="Abra o link enviado pelo coordenador.";
return;
}
let data=JSON.parse(atob(param));
nomes=data.nomes||{};
pres=data.pres||{};
roles=data.roles||{};
document.getElementById("msg").style.display="none";
render();
}catch(e){
document.getElementById("msg").innerText="Erro ao carregar dados. Peça novo link.";
}
}

function render(){
let el=document.getElementById("painel"); el.innerHTML="";
Object.keys(escala).forEach(dia=>{
let d=escala[dia]; let card=document.createElement("div"); card.className="card";
card.innerHTML=`<b>${dia}</b><div class="intervalo">⏱ ${d.i}</div>`;

function sec(t,l,cls){
let s=document.createElement("div"); s.innerHTML="<small>"+t+"</small>"; let r=document.createElement("div"); r.className="row";
l.forEach(n=>{
let nm=nomes[n]||"---";
let div=document.createElement("div"); div.className="caixa "+cls;
if(pres[n]) div.classList.add("presente");
div.innerHTML=`${nm}<span class="role">${roles[nm]||""}</span>`;
r.appendChild(div);
});
s.appendChild(r); return s;
}

card.appendChild(sec("PIX/Dinheiro",d.pix,"pix"));
card.appendChild(sec("Cartão 1",d.c1,"cartao"));
card.appendChild(sec("Cartão 2",d.c2,"cartao"));
card.appendChild(sec("Apoio",d.a,"apoio"));
el.appendChild(card);
});
}

// Atualização automática a cada 5 segundos
function atualizarAuto(){
try{
let param=new URLSearchParams(window.location.search).get("data");
if(param){
let data=JSON.parse(atob(param));
nomes=data.nomes||nomes;
pres=data.pres||pres;
roles=data.roles||roles;
render();
}
}catch(e){}
}

// Rodar
window.onload=()=>{
importar();
setInterval(atualizarAuto,5000);
};
</script>

</body>
</html>
