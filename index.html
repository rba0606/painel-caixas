<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Caixas - Retiro Semana Santa</title>
<style>
:root {
  --bg: #f4f7ff;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --primary: #2563eb;
  --success: #16a34a;
  --danger: #dc2626;
  --warning: #f59e0b;
  --shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
}
* { box-sizing: border-box; }
body { margin: 0; font-family: "Inter", Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
header { background: #1e293b; color: #f8fafc; text-align: center; padding: 14px 16px; font-size: 1.2rem; font-weight: 700; }
.main { max-width: 1100px; margin: 18px auto 30px; padding: 0 14px; }
.card-header { margin-bottom: 28px; }
.intervalo { background: #f1f5f9; color: #334155; padding: 4px 8px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; }
.turno-balao { position: relative; z-index: 1; }
.panel { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
.panel label { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; display: block; }
.panel input, .panel select, .panel button { width: 100%; border: 1px solid #cbd5e1; border-radius: 10px; background: #fff; color: var(--text); padding: 10px 10px; font-size: 0.95rem; }
.panel input:focus, .panel select:focus, .panel button:focus { outline: 2px solid #93c5fd; }
.panel button { border: 0; color: #fff; cursor: pointer; font-weight: 600; }
.btn-primary { background: var(--primary); }
.btn-success { background: var(--success); }
.btn-danger { background: var(--danger); }
.btn-warning { background: var(--warning); }
.btn-icon { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.container { display: grid; gap: 14px; }
.card { background: var(--card); padding: 14px; border-radius: 14px; box-shadow: var(--shadow); border: 1px solid #e2e8f0; }
.card-header { display: flex; justify-content: flex-start; align-items: center; gap: 10px; margin-bottom: 12px; }
.card-header b { font-size: 1rem; }
.intervalo { font-size: 0.78rem; background: #f1f5f9; padding: 3px 8px; border-radius: 8px; color: #334155; font-weight: 600; }
.turno-balao { background: #f1f5f9; color: #1e293b; margin: 0 auto 10px; display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 600; text-align: center; box-shadow: 0 3px 8px rgba(15,23,42,.08); }
.turno-balao.reservado { background: #dbeafe; color: #1e3a8a; border: 1px solid #93c5fd; }
.text-center { display: block; margin: 0 auto 10px; }
.row { display: grid; grid-template-columns: repeat(2, minmax(120px, 1fr)); gap: 8px; }
.caixa { position: relative; border-radius: 10px; background: #f8fafc; padding: 10px 10px 8px 10px; border: 1px solid #cbd5e1; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
.caixa:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(15,23,42,.12); }
.caixa .nome { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
.caixa .meta { display: flex; justify-content: space-between; align-items: center; }
.caixa .role { font-size: 0.75rem; color: #475569; }
.caixa .badge { font-size: 0.72rem; font-weight: 600; color: #64748b; background: #e2e8f0; border-radius: 8px; padding: 2px 6px; }
.caixa .edit-btn { border: 0; background: transparent; color: #2563eb; font-size: 0.82rem; cursor: pointer; text-decoration: underline; padding: 1px 2px; }
.caixa.presente { border-color: #16a34a; background: #dcfce7; }
.caixa.ausente { border-color: #e11d48; background: #fee2e2; }
.info { margin-top: 5px; font-size: 0.8rem; color: var(--muted); }
.qr-area { margin-top: 10px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.qr-area a { color: #2563eb; word-break: break-all; text-decoration: none; }
.actions { display: flex; gap: 10px; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
@media (max-width: 640px) {
  body { font-size: 14px; }
  header { font-size: 1rem; padding: 12px 10px; }
  .main { padding: 0 10px; }
  .card { padding: 10px; border-radius: 12px; }
  .card-header { flex-direction: column; align-items: flex-start; gap: 5px; }
  .intervalo { position: static; margin-top: 4px; }
  .turno-balao { padding: 3px 8px; font-size: 0.7rem; }
  .info { font-size: 0.75rem; }
  .row { grid-template-columns: 1fr; gap: 7px; }
  .caixa { min-height: 62px; padding: 10px; }
  .caixa .nome { font-size: 0.9rem; }
  .caixa .meta { gap: 6px; }
  .caixa .badge { font-size: 0.68rem; padding: 1px 5px; }
  .caixa .edit-btn { font-size: 0.76rem; }
  .actions { flex-direction: column; align-items: stretch; gap: 8px; }
  .actions button { width: 100%; }
  .qr-area { flex-direction: column; align-items: stretch; }
  .qr-area a { font-size: 0.82rem; word-break: break-word; }
  .qr-area canvas { width: 100px !important; height: auto; }
}
</style>
</head>
<body>
<header>📊 Painel de Caixas - Retiro Semana Santa</header>
<main class="main">
  <div class="info">Clique no nome para marcar presença/ausência. 2 caixas por hora (1 PIX + 1 Cartão), todos os 32 são escalados sem repetir entre dias. Use ✎ para editar nome.</div>

  <div class="card" style="border-color:#cbd5e1; background:#eef2ff;">
    <div class="card-header"><b>Cadastro de horário pessoal</b></div>
    <div class="panel" style="grid-template-columns: repeat(4, 1fr); gap: 10px;">
      <div>
        <label for="nomeDisponibilidade">Seu nome</label>
        <input type="text" id="nomeDisponibilidade" placeholder="Ex: João" />
      </div>
      <div>
        <label for="diaDisponibilidade">Dia</label>
        <select id="diaDisponibilidade">
          <option value="">Selecione</option>
          <option value="Quinta">Quinta</option>
          <option value="Sexta">Sexta</option>
          <option value="Sábado">Sábado</option>
          <option value="Domingo">Domingo</option>
        </select>
      </div>
      <div>
        <label for="horaDisponibilidade">Hora</label>
        <select id="horaDisponibilidade">
          <option value="">Selecione</option>
          <option value="08:45-09:45">08:45-09:45</option>
          <option value="09:45-10:45">09:45-10:45</option>
          <option value="10:45-11:45">10:45-11:45</option>
          <option value="11:45-12:30">11:45-12:30</option>
          <option value="13:30-14:30">13:30-14:30</option>
          <option value="14:30-15:30">14:30-15:30</option>
          <option value="15:30-16:30">15:30-16:30</option>
          <option value="16:30-17:30">16:30-17:30</option>
          <option value="13:45-14:45">13:45-14:45</option>
          <option value="14:45-15:45">14:45-15:45</option>
          <option value="15:45-16:45">15:45-16:45</option>
          <option value="16:45-17:50">16:45-17:50</option>
        </select>
      </div>
      <div style="align-self: end;">
        <button class="btn-success" onclick="adicionarDisponibilidade()">💾 Salvar horário</button>
      </div>
    </div>
    <div id="disponibilidadeList" class="info" style="margin-top: 8px;"></div>
  </div>

  <div class="container" id="painel"></div>

  <div class="actions">
    <button class="btn-danger" onclick="limparNomes()">🧹 Limpar nomes</button>
    <button class="btn-warning" onclick="gerarCSV()">📄 Exportar CSV</button>
    <button class="btn-success" onclick="exportar()">📤 Compartilhar link</button>
  </div>

  <div class="qr-area" id="qr"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
const escala = {
  Quinta: { i: '13:30 - 17:30', horas: ['13:30-14:30','14:30-15:30','15:30-16:30','16:30-17:30'], pix: [1,3,5,7], cartao: [2,4,6,8] },
  Sexta:  { i: '08:45 - 12:30', horas: ['08:45-09:45','09:45-10:45','10:45-11:45','11:45-12:30'], pix: [9,11,13,15], cartao: [10,12,14,16] },
  Sábado: { i: '08:45 - 12:30', horas: ['08:45-09:45','09:45-10:45','10:45-11:45','11:45-12:30'], pix: [17,19,21,23], cartao: [18,20,22,24] },
  Domingo:{ i: '13:45 - 17:50', horas: ['13:45-14:45','14:45-15:45','15:45-16:45','16:45-17:50'], pix: [25,27,29,31], cartao: [26,28,30,32] }
};

let nomes = JSON.parse(localStorage.getItem('nomes')||'{}');
let pres = JSON.parse(localStorage.getItem('pres')||'{}');
let roles = JSON.parse(localStorage.getItem('roles')||'{}');
let disponibilidade = JSON.parse(localStorage.getItem('disponibilidade')||'{}');

if(Object.keys(nomes).length === 0){
  for(let i=1;i<=32;i++) nomes[i] = 'Caixa '+i;
}

function salvar(){
  localStorage.setItem('disponibilidade', JSON.stringify(disponibilidade));
  localStorage.setItem('nomes', JSON.stringify(nomes));
  localStorage.setItem('pres', JSON.stringify(pres));
  localStorage.setItem('roles', JSON.stringify(roles));
}

function toggle(n){
  pres[n] = !pres[n];
  salvar(); render();
}

function trocar(pos){
  roles[pos] = roles[pos] === 'ZAC' ? 'Operador' : 'ZAC';
  salvar(); render();
}

function editarNome(pos){
  const atual = nomes[pos] || 'Caixa '+pos;
  const novo = prompt('Defina o nome para esta função / posição:', atual);
  if(novo !== null){
    const txt = novo.trim();
    if(txt){ nomes[pos] = txt; salvar(); render(); }
  }
}

function getHorariosPreenchidos(){
  const m = {};
  Object.values(disponibilidade).forEach(lista => {
    lista.forEach(item => {
      const key = `${item.dia}|${item.hora}`;
      m[key] = (m[key] || 0) + 1;
    });
  });
  return m;
}

function render(){
  const el = document.getElementById('painel'); el.innerHTML = '';
  const busca = '';
  const horariosPreenchidos = getHorariosPreenchidos();

  Object.keys(escala).forEach(dia => {
    const d = escala[dia];
    const card = document.createElement('div'); card.className = 'card';
    const header = document.createElement('div'); header.className = 'card-header';
    header.innerHTML = `<b>${dia}</b><span class='intervalo'>⏱ ${d.i}</span>`;
    card.appendChild(header);

    function secDupla(dia, hora, pixId, cartaoId){
      const base = document.createElement('div');
      base.style.marginBottom = '10px';
      const label = document.createElement('div'); label.className = 'turno-balao text-center';
      const key = `${dia}|${hora}`;
      const count = horariosPreenchidos[key] || 0;
      if(count > 0){
        label.classList.add('reservado');
        label.innerText = `Turno: ${hora} • preenchido (${count})`;
      } else {
        label.innerText = `Turno: ${hora}`;
      }
      const r = document.createElement('div'); r.className = 'row';

      [[pixId, 'PIX/Dinheiro'], [cartaoId, 'Cartão']].forEach(([n,setor])=>{
        const nm = nomes[n] || 'Caixa '+n;
        const div = document.createElement('div');
        const presente = !!pres[n];
        div.className = 'caixa ' + (presente ? 'presente' : '');
        div.innerHTML = `
          <div class='nome'>${nm}</div>
          <div style='font-size:0.78rem;color:#94a3b8'>${setor}</div>
          <div class='meta'>
            <span class='badge'>#${n}</span>
            <button class='edit-btn' onclick='event.stopPropagation(); editarNome(${n})'>✎</button>
          </div>`;
        div.onclick = () => toggle(n);
        div.oncontextmenu = (e) => { e.preventDefault(); editarNome(n); };
        r.appendChild(div);
      });

      base.appendChild(label); base.appendChild(r);
      card.appendChild(base);
    }

    d.horas.forEach((hora,i)=>{
      secDupla(dia, hora, d.pix[i], d.cartao[i]);
    });

    if(card.querySelector('.row')) el.appendChild(card);
  });

  gerarLinkEquipe();
  renderDisponibilidade();
}

function renderDisponibilidade(){
  const el = document.getElementById('disponibilidadeList');
  if(!el) return;
  el.innerHTML = '';

  const nenhum = document.createElement('div');
  nenhum.className = 'info';

  const pessoas = Object.keys(disponibilidade);
  if(pessoas.length === 0){
    nenhum.innerText = 'Nenhuma disponibilidade cadastrada ainda.';
    el.appendChild(nenhum);
    return;
  }

  pessoas.forEach(nome => {
    const bloco = document.createElement('div');
    bloco.style.marginBottom = '8px';
    bloco.innerHTML = `<strong>${nome}</strong>:`;

    const lista = document.createElement('div');
    lista.style.marginTop = '4px';
    disponibilidade[nome].forEach((item, idx) => {
      const itemEl = document.createElement('div');
      itemEl.style.display = 'inline-flex';
      itemEl.style.alignItems = 'center';
      itemEl.style.gap = '6px';
      itemEl.style.marginBottom = '4px';
      itemEl.innerHTML = `<span>${item.dia} ${item.hora}</span> <button class='edit-btn' style='padding:2px 6px;' onclick='removerDisponibilidade("${nome}",${idx})'>✕</button>`;
      lista.appendChild(itemEl);
    });

    bloco.appendChild(lista);
    el.appendChild(bloco);
  });
}

function adicionarDisponibilidade(){
  const nome = document.getElementById('nomeDisponibilidade').value.trim();
  const dia = document.getElementById('diaDisponibilidade').value;
  const hora = document.getElementById('horaDisponibilidade').value;

  if(!nome){ return alert('Informe seu nome para cadastrar horário.'); }
  if(!dia || !hora){ return alert('Selecione dia e hora.'); }

  disponibilidade[nome] = disponibilidade[nome] || [];
  const existente = disponibilidade[nome].some(item => item.dia === dia && item.hora === hora);
  if(existente){
    return alert('Horário já cadastrado para este nome.');
  }

  disponibilidade[nome].push({dia, hora});
  salvar();
  renderDisponibilidade();
  document.getElementById('nomeDisponibilidade').value = '';
  alert('Horário salvo automaticamente!');
}

function removerDisponibilidade(nome, idx){
  if(!disponibilidade[nome]) return;
  disponibilidade[nome].splice(idx, 1);
  if(disponibilidade[nome].length === 0) delete disponibilidade[nome];
  salvar();
  renderDisponibilidade();
}

function limparNomes(){
  if(!confirm('Tem certeza que deseja limpar todos os nomes?')) return;
  nomes={}; roles={}; pres={};
  for(let i=1;i<=32;i++){ nomes[i]='Caixa '+i; }
  salvar(); render();
  alert('Nomes resetados!');
}

function exportar(){
  alert('Link gerado automaticamente abaixo em QR Code');
  gerarLinkEquipe();
}

function gerarLinkEquipe(){
  const data = btoa(JSON.stringify({nomes,pres,roles}));
  let targetPath;
  if(location.pathname.endsWith('index.html')){
    targetPath = location.pathname.replace(/index\.html$/, 'viewer.html');
  } else if(location.pathname.endsWith('/')){
    targetPath = location.pathname + 'viewer.html';
  } else {
    targetPath = location.pathname + '/viewer.html';
  }
  const link = location.origin + targetPath + '?data=' + data;

  const qr = document.getElementById('qr');
  qr.innerHTML = '';
  const canvas = document.createElement('canvas');
  QRCode.toCanvas(canvas, link, {width:180}, function(error){ if(error) console.error(error); });
  qr.appendChild(canvas);
  const a = document.createElement('a'); a.href=link; a.target='_blank'; a.innerText='Abrir link da equipe';
  qr.appendChild(a);
}

function gerarCSV(){
  let linhas = ['Dia,Hora,Setor,Posição,Caixa,Função,Presença'];
  Object.keys(escala).forEach(dia => {
    const d = escala[dia];
    d.horas.forEach((hora,i)=>{
      [['PIX/Dinheiro',d.pix[i]],['Cartão',d.cartao[i]]].forEach(([setor,n])=>{
        const nm = nomes[n] || 'Caixa '+n;
        const presenca = pres[n] ? 'Presente' : 'Ausente';
        const nmEsc = nm.replace(/"/g, '""');
        linhas.push(`${dia},${hora},${setor},${i+1},"${nmEsc}",${presenca}`);
      });
    });
  });
  const csv = linhas.join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'escala_caixas.csv';
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

window.onload = () => { render(); };
</script>
</body>
</html>
