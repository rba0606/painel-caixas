<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Profissional</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
header{text-align:center;padding:15px;background:#1e293b}

button{width:100%;padding:10px;margin-top:5px;border:none;border-radius:8px;background:#3b82f6;color:#fff}

.card{background:#1e293b;margin:10px;padding:10px;border-radius:10px}
.row{display:flex;flex-wrap:wrap;gap:6px}

.caixa{padding:10px;border-radius:8px;font-size:12px;cursor:pointer;display:flex;flex-direction:column}
.pix{background:#22c55e}
.cartao{background:#f59e0b}
.apoio{background:#ef4444}
.presente{background:#3b82f6!important}

.role{font-size:10px}
</style>
</head>

<body>

<header>
<h2>Painel Profissional</h2>
<p>Modo compartilhável (sem Firebase)</p>
</header>

<div style="padding:10px">
<textarea id="nomes" placeholder="Cole nomes"></textarea>
<button onclick="carregar()">Aplicar nomes</button>

<button onclick="exportar()">📤 Gerar link compartilhável</button>
<button onclick="importar()">📥 Importar estado</button>
</div>

<div id="painel"></div>

<script>
const escala={
"Quinta":{pix:[1,2],c1:[3,4],c2:[5,6],a:[7,8,9,10]},
"Sexta":{pix:[11,12],c1:[13,14],c2:[15,16],a:[17,18,19,20]},
"Sábado":{pix:[21,22],c1:[23,24],c2:[25,1],a:[2,3,4,5]},
"Domingo":{pix:[6,7],c1:[8,9],c2:[10,11],a:[12,13,14,15,16,17]}
};

let nomes=JSON.parse(localStorage.getItem("nomes")||"{}");
let pres=JSON.parse(localStorage.getItem("pres")||"{}");
let roles=JSON.parse(localStorage.getItem("roles")||"{}");

if(Object.keys(nomes).length===0){
for(let i=1;i<=25;i++) nomes[i]="Caixa "+i;
}

function salvar(){
localStorage.setItem("nomes",JSON.stringify(nomes));
localStorage.setItem("pres",JSON.stringify(pres));
localStorage.setItem("roles",JSON.stringify(roles));
}

function toggle(n){
pres[n]=!pres[n];
salvar();
render();
}

function trocar(nome){
roles[nome]=roles[nome]==="ZAC"?"Operador":"ZAC";
salvar();
render();
}

function render(){
let el=document.getElementById("painel");
el.innerHTML="";

Object.keys(escala).forEach(dia=>{
let d=escala[dia];
let card=document.createElement("div");
card.className="card";
card.innerHTML="<b>"+dia+"</b>";

function sec(t,l,cls){
let s=document.createElement("div");
s.innerHTML="<small>"+t+"</small>";
let r=document.createElement("div");
r.className="row";

l.forEach((n,i)=>{
let nm=nomes[n]||"Caixa "+n;

if(!roles[nm]) roles[nm]=i%2==0?"Operador":"ZAC";

let div=document.createElement("div");
div.className="caixa "+cls;

if(pres[n]) div.classList.add("presente");

div.innerHTML=`${nm}<span class="role">${roles[nm]}</span>`;

div.onclick=()=>toggle(n);
div.ondblclick=()=>trocar(nm);

r.appendChild(div);
});

s.appendChild(r);
return s;
}

card.appendChild(sec("PIX/Dinheiro",d.pix,"pix"));
card.appendChild(sec("Cartão 1",d.c1,"cartao"));
card.appendChild(sec("Cartão 2",d.c2,"cartao"));
card.appendChild(sec("Apoio",d.a,"apoio"));

el.appendChild(card);
});
}

function carregar(){
let lista=document.getElementById("nomes").value.split("\\n");
nomes={};
lista.forEach((n,i)=>{if(n.trim()) nomes[i+1]=n.trim();});
salvar();
render();
}

// 🔥 EXPORTAR ESTADO
function exportar(){
let data = btoa(JSON.stringify({nomes,pres,roles}));
let link = location.origin + location.pathname + "?data=" + data;
prompt("Copie o link:", link);
}

// 🔥 IMPORTAR
function importar(){
let param = new URLSearchParams(window.location.search).get("data");
if(param){
let data = JSON.parse(atob(param));
nomes=data.nomes||nomes;
pres=data.pres||pres;
roles=data.roles||roles;
salvar();
render();
alert("Dados carregados!");
}else{
alert("Nenhum dado encontrado no link");
}
}

// AUTO IMPORTAR
window.onload=importar;

render();
</script>

</body>
</html>
