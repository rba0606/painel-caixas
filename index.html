<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala Caixas - Retiro Semana Santa</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 40px; }
        
        header {
            background: #1e293b;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: var(--shadow);
        }

        .main { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        .status-bar {
            background: #e2e8f0;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border-left: 5px solid #cbd5e1;
        }

        .card.quinta { border-left-color: #3b82f6; }
        .card.sexta { border-left-color: #10b981; }
        .card.sabado { border-left-color: #f59e0b; }
        .card.domingo { border-left-color: #ef4444; }

        .dia-titulo { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .turno-bloco {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .hora-badge {
            display: inline-block;
            background: #334155;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        .grid-caixas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .caixa-item {
            background: white;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
        }

        .caixa-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; font-weight: bold; }
        .caixa-nome { font-size: 0.9rem; font-weight: 600; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .caixa-vago { color: #cbd5e1; font-style: italic; }

        /* Cadastro */
        .form-cadastro {
            background: #eff6ff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #bfdbfe;
        }
        .form-cadastro input, .form-cadastro select {
            width: 100%;
            padding: 10px;
            margin: 5px 0 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }
        .btn-salvar {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .grid-caixas { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>📊 Escala de Caixas</header>

<main class="main">
    <div class="status-bar" id="status">Sincronizando com a nuvem...</div>

    <div class="form-cadastro">
        <strong style="display:block; margin-bottom:10px;">✍️ Reservar meu Horário</strong>
        <input type="text" id="nomeInput" placeholder="Seu nome completo">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <select id="diaSelect" onchange="atualizarHoras()">
                <option value="">Dia...</option>
                <option value="Quinta">Quinta</option>
                <option value="Sexta">Sexta</option>
                <option value="Sábado">Sábado</option>
                <option value="Domingo">Domingo</option>
            </select>
            <select id="horaSelect">
                <option value="">Hora...</option>
            </select>
        </div>
        <button class="btn-salvar" onclick="cadastrarHorario()">💾 Confirmar Horário</button>
    </div>

    <div id="painel"></div>
</main>

<script>
    // 🔗 COLOQUE A URL DO SEU GOOGLE APPS SCRIPT AQUI:
    const API_URL = "https://script.google.com/macros/s/AKfycbxFQYiwFFsVbvCb7Ba28mKxVjcwQoWUxbTNWmYyIO-8uEQ2qS6Sov_FK96rrVTIym0flg/exec";

    const escala = {
        Quinta:  { label: 'QUINTA', h: ['13:30-14:30','14:30-15:30','15:30-16:30','16:30-17:30'], pix: [1,3,5,7], crt: [2,4,6,8], css: 'quinta' },
        Sexta:   { label: 'SEXTA',  h: ['08:45-09:45','09:45-10:45','10:45-11:45','11:45-12:30'], pix: [9,11,13,15], crt: [10,12,14,16], css: 'sexta' },
        Sábado:  { label: 'SÁBADO', h: ['08:45-09:45','09:45-10:45','10:45-11:45','11:45-12:30'], pix: [17,19,21,23], crt: [18,20,22,24], css: 'sabado' },
        Domingo: { label: 'DOMIN.', h: ['13:45-14:45','14:45-15:45','15:45-16:45','16:45-17:50'], pix: [25,27,29,31], crt: [26,28,30,32], css: 'domingo' }
    };

    let nomesDB = {};

    async function loadData() {
        document.getElementById('status').innerText = "🔄 Atualizando...";
        try {
            const response = await fetch(API_URL);
            nomesDB = await response.json();
            render();
            document.getElementById('status').innerText = "✅ Sincronizado agora";
        } catch (e) {
            document.getElementById('status').innerText = "⚠️ Erro de conexão";
        }
    }

    async function saveData(id, nome) {
        document.getElementById('status').innerText = "💾 Salvando...";
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors', // Necessário para Google Scripts
                body: JSON.stringify({ id: id, nome: nome })
            });
            // Como no-cors não retorna resposta, aguardamos um pouco e recarregamos
            setTimeout(loadData, 1500);
        } catch (e) {
            alert("Erro ao salvar!");
        }
    }

    function render() {
        const painel = document.getElementById('painel');
        painel.innerHTML = '';

        Object.keys(escala).forEach(dia => {
            const info = escala[dia];
            let html = `<div class="card ${info.css}">
                <div class="dia-titulo"><span>${info.label}</span> <small style="font-size:0.7rem; color:var(--muted)">${dia}</small></div>`;
            
            info.h.forEach((hora, i) => {
                const idPix = info.pix[i];
                const idCrt = info.crt[i];
                const nPix = nomesDB[idPix] || "";
                const nCrt = nomesDB[idCrt] || "";

                html += `
                <div class="turno-bloco">
                    <div class="hora-badge">${hora}</div>
                    <div class="grid-caixas">
                        <div class="caixa-item" onclick="manualEdit(${idPix})">
                            <div class="caixa-label">Caixa 1 (Pix)</div>
                            <div class="caixa-nome">${nPix || '<span class="caixa-vago">Vago</span>'}</div>
                        </div>
                        <div class="caixa-item" onclick="manualEdit(${idCrt})">
                            <div class="caixa-label">Caixa 2 (Crt)</div>
                            <div class="caixa-nome">${nCrt || '<span class="caixa-vago">Vago</span>'}</div>
                        </div>
                    </div>
                </div>`;
            });
            html += `</div>`;
            painel.innerHTML += html;
        });
    }

    function atualizarHoras() {
        const dia = document.getElementById('diaSelect').value;
        const select = document.getElementById('horaSelect');
        select.innerHTML = '<option value="">Hora...</option>';
        if(dia && escala[dia]) {
            escala[dia].h.forEach(h => {
                select.innerHTML += `<option value="${h}">${h}</option>`;
            });
        }
    }

    async function cadastrarHorario() {
        const nome = document.getElementById('nomeInput').value.trim();
        const dia = document.getElementById('diaSelect').value;
        const hora = document.getElementById('horaSelect').value;

        if(!nome || !dia || !hora) return alert("Preencha todos os campos!");

        const info = escala[dia];
        const idx = info.h.indexOf(hora);
        const idPix = info.pix[idx];
        const idCrt = info.crt[idx];

        // Tenta vaga no Pix primeiro, depois Cartão
        let idAlocar = null;
        if(!nomesDB[idPix] || nomesDB[idPix].includes("Caixa")) idAlocar = idPix;
        else if(!nomesDB[idCrt] || nomesDB[idCrt].includes("Caixa")) idAlocar = idCrt;

        if(!idAlocar) return alert("Este horário já está completo!");

        await saveData(idAlocar, nome);
        document.getElementById('nomeInput').value = '';
    }

    function manualEdit(id) {
        const novo = prompt("Editar nome para esta posição:", nomesDB[id] || "");
        if(novo !== null) saveData(id, novo.trim());
    }

    // Iniciar
    loadData();
    // Auto-refresh a cada 60 segundos
    setInterval(loadData, 60000);
</script>

</body>
</html>
