<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Caixas</title>

<style>
body{font-family:Arial;background:#020617;color:#fff;margin:0}
header{text-align:center;padding:15px;background:#1e293b}
.topo{padding:10px}
textarea{
width:100%;
height:80px;
border-radius:10px;
padding:10px;
border:none;
font-size:14px;
}
button{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:10px;
background:#3b82f6;
color:#fff;
font-size:14px;
cursor:pointer;
}
button:hover{background:#2563eb}
.container{
display:grid;
grid-template-columns:1fr;
gap:12px;
padding:10px;
}
.card{
background:#1e293b;
padding:12px;
border-radius:12px;
position:relative;
}
.intervalo{
position:absolute;
top:10px;
right:10px;
background:#ef4444;
padding:4px 8px;
border-radius:8px;
font-size:12px;
}
.row{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:8px;
}
.caixa{
padding:12px;
border-radius:10px;
font-size:14px;
display:flex;
flex-direction:column;
cursor:pointer;
}
.pix{background:#22c55e}
.cartao{background:#f59e0b}
.apoio{background:#ef4444}
.presente{background:#3b82f6!important}
.role{font-size:11px;margin-top:3px}
.linkEquipe{
margin-top:10px;
display:block;
color:#3b82f6;
text-align:center;
font-weight:bold;
text-decoration:none;
}
</style>
</head>

<body>

<header>📊 Painel de Caixas</header>

<div class="topo">
<textarea id="nomes" placeholder="Cole os nomes (um por linha)"></textarea>

<button onclick="carregar()">Aplicar nomes</button>
<button onclick="gerarLinkEquipe()">📤 Gerar link para a equipe</button>
<button onclick="limparNomes()" style="background:#ef4444">🧹 Limpar nomes</button>

<div id="linkContainer"></div>
</div>

<div class="container" id="painel"></div>

<script>
const escala={
"Quinta":{i:"16:10",pix:[1,2],c1:[3,4],c2:[5,6],a:[7,8,9,10]},
"Sexta":{i:"11:00",pix:[11,12],c1:[13,14],c2:[15,16],a:[17,18,19,20]},
"Sábado":{i:"11:00",pix:[21,22],c1:[23,24],c2:[25,1],a:[2,3,4,5]},
"Domingo":{i:"17:20",pix:[6,7],c1:[8,9],c2:[10,11],a:[12,13,14,15,16,17]}
};

let nomes=JSON.parse(localStorage.getItem("nomes")||"{}");
let pres=JSON.parse(localStorage.getItem("pres")||"{}");
let roles=JSON.parse(localStorage.getItem("roles")||"{}");

// Inicializa nomes padrão
if(Object.keys(nomes).length===0){
  for(let i=1;i<=25;i++) nomes[i]="Caixa "+i;
}

function salvar(){
  localStorage.setItem("nomes",JSON.stringify(nomes));
  localStorage.setItem("pres",JSON.stringify(pres));
  localStorage.setItem("roles",JSON.stringify(roles));
}

// Marca presença
function toggle(n){ 
  pres[n]=!pres[n]; 
  salvar(); 
  render(); 
}

// Troca função Operador/ZAC
function trocar(nome){ 
  roles[nome]=roles[nome]==="ZAC"?"Operador":"ZAC"; 
  salvar(); 
  render(); 
}

function render(){
  let el=document.getElementById("painel"); el.innerHTML="";

  Object.keys(escala).forEach(dia=>{
    let d=escala[dia]; 
    let card=document.createElement("div"); card.className="card";

    card.innerHTML=`<b>${dia}</b><div class="intervalo">⏱ ${d.i}</div>`;

    function sec(t,l,cls){
      let s=document.createElement("div"); s.innerHTML="<small>"+t+"</small>"; 
      let r=document.createElement("div"); r.className="row";

      l.forEach((n,i)=>{
        let nm=nomes[n]||"Caixa "+n;
        if(!roles[nm]) roles[nm]=i%2==0?"Operador":"ZAC";

        let div=document.createElement("div");
        div.className="caixa "+cls;
        if(pres[n]) div.classList.add("presente");
        div.innerHTML=`${nm}<span class="role">${roles[nm]}</span>`;

        div.onclick=()=>toggle(n);
        div.ondblclick=()=>trocar(nm);

        // Clique direito para editar nome
        div.oncontextmenu=(e)=>{
          e.preventDefault();
          let novo=prompt("Editar nome:", nm);
          if(novo){ nomes[n]=novo; salvar(); render(); }
        };

        r.appendChild(div);
      });

      s.appendChild(r); return s;
    }

    card.appendChild(sec("PIX/Dinheiro",d.pix,"pix"));
    card.appendChild(sec("Cartão 1",d.c1,"cartao"));
    card.appendChild(sec("Cartão 2",d.c2,"cartao"));
    card.appendChild(sec("Apoio",d.a,"apoio"));

    el.appendChild(card);
  });
}

function carregar(){
  let texto=document.getElementById("nomes").value;
  let lista=texto.split("\n").map(n=>n.trim()).filter(n=>n!=="");

  if(lista.length===0){ alert("Digite pelo menos um nome"); return; }
  if(lista.length>25){ alert("Máximo de 25 nomes. Os extras serão ignorados."); }

  nomes={}; lista.slice(0,25).forEach((nome,i)=>{ nomes[i+1]=nome; });
  roles={}; salvar(); render(); alert("Nomes carregados com sucesso!");
}

// Limpar nomes
function limparNomes(){
  if(!confirm("Tem certeza que deseja limpar todos os nomes?")) return;

  nomes={}; roles={}; pres={};
  for(let i=1;i<=25;i++){ nomes[i]="Caixa "+i; }
  document.getElementById("nomes").value="";
  salvar(); render(); alert("Nomes resetados!");
}

// Gerar link para a equipe
function gerarLinkEquipe(){
  let data=btoa(JSON.stringify({nomes,pres,roles}));
  let viewerPath = location.origin + location.pathname.replace(/index\.html$/,"viewer.html");
  let link = viewerPath + "?data=" + data;

  let container=document.getElementById("linkContainer");
  container.innerHTML=`<a href="${link}" target="_blank" class="linkEquipe">Abrir link da equipe</a>`;
}

window.onload=render;
</script>

</body>
</html>
